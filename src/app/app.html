<!-- Main Container: Grid layout, perfect centering, overflow hidden so massive button doesn't scroll -->
<main class="grid place-items-center min-h-screen bg-gradient-to-br from-pink-200 via-pink-100 to-rose-200 p-4 overflow-hidden">

  @if (!isAccepted()) {
    <!-- Valentine Proposal State -->
    <div class="grid place-items-center gap-8 w-full max-w-3xl z-10">

      <!-- Dynamic GIF right in the middle -->
      <img [src]="currentGif()" alt="Cute bear" class="w-64 h-64 object-contain drop-shadow-xl" />

      <!-- Romantic Title -->
      <h1 class="text-4xl md:text-5xl font-extrabold text-rose-600 text-center tracking-tight">
        Will you be my Valentine?
      </h1>

      <!-- Buttons Grid: Flex-wrap allows the Yes button to eventually push the No button away -->
      <div class="flex flex-wrap items-center justify-center gap-4 w-full mt-4">

        <!-- YES BUTTON: Grows massively -->
        <button
          class="bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl shadow-xl transition-all duration-300 ease-in-out z-50"
          [ngStyle]="{
            'font-size.px': yesButtonSize(),
            'padding': (yesButtonSize() / 2) + 'px ' + yesButtonSize() + 'px'
          }"
          (click)="acceptValentine()">
          Yes
        </button>

        <!-- NO BUTTON: Changes text -->
        <button
          class="bg-white text-rose-500 border-2 border-rose-200 hover:bg-rose-50 font-bold py-3 px-6 rounded-xl shadow-md transition-all duration-200"
          (click)="handleNoClick()">
          {{ currentNoText() }}
        </button>

      </div>
    </div>

  } @else {
    <!-- Success State -->
    <div class="grid place-items-center gap-6 z-10 animate-fade-in">
      <img [src]="currentGif()" alt="Happy kissing bears" class="w-72 h-72 object-contain drop-shadow-2xl" />
      <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-600 text-center animate-bounce">
        YAY! I love you! ❤️
      </h1>
    </div>
  }

</main>
